name: backtesting_app
description: ModernAlgos Backtesting - Static UI
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1       # State management
  riverpod_annotation: ^2.3.5    # Optional codegen (not required for this setup)
  http: ^1.2.1                   # HTTP client for API calls
  google_fonts: ^6.2.1
  uuid: ^4.0.0
  fl_chart: ^0.68.0         

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true